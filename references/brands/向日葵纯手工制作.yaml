# 内容规范
taboo:
  - "最好的"
  - "第一"
  - "绝对"
  - "药效"
  - "治疗"
  - "包治"
  - "贬低竞品"
  - "虚假功效宣传"
preferred_topics:
  - "手工匠心制作过程"
  - "食材产地溯源"
  - "养生知识科普"
  - "季节性养生（换季/冬补/秋燥）"
  - "送礼场景"
  - "真实用户口碑"
  - "传统食疗文化"

# 内容约束
content_rules:
  - "不得宣传任何医疗功效，只能说'传统食养''日常养护'"
  - "强调'手工制作、无添加剂'的核心卖点"
  - "提及'产量有限、支持预定'增加稀缺感"
  - "价格信息可适当提及但不要变成价格表"
  - "每篇文章聚焦1-2个品类，不要罗列全部产品"
  - "多用生活场景描写，少用产品参数堆砌"
  - "养生食品类需结合时令节气话题"

# 三大品类营销策略
category_strategy:
  养生食品:
    angle: "时令养生+传统食疗智慧"
    tone: "温暖关怀、专业可信"
    hook: "换季/节气/天气变化切入"
  麻辣开味:
    angle: "下饭神器+吃货分享"
    tone: "轻松活泼、馋人口水"
    hook: "美食场景/深夜放毒/办公室零食"
  网红烘焙甜品:
    angle: "手作温度+送礼心意"
    tone: "精致甜美、仪式感"
    hook: "下午茶/节日送礼/闺蜜分享"

